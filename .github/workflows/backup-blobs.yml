# weekly snapshot of all blob-stored site content into backups/, committed
# to the repo. the blobs are the source of truth; this is the safety net.
# manual run: actions tab -> backup blobs -> run workflow.
name: backup blobs

on:
  schedule:
    # sunday 21:00 utc = monday 7-8am sydney
    - cron: "0 21 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: snapshot blobs via the public api
        run: node scripts/backup-blobs.mjs https://russelljiang.com
      - name: commit if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups
          if git diff --cached --quiet; then
            echo "no changes — skipping commit"
          else
            git commit -m "chore: weekly blob backup"
            git push
          fi
